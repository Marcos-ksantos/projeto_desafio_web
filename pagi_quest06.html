        pacientes e, para isto, se utiliza do Índice de Massa
        Corporal (IMC). Sabendo-se que o IMC é calculado através
        da seguinte fórmula:
        Fazer um algoritmo que apresente o nome do paciente
        e sua faixa de risco.</h1>
    
    <div id="div-form">
        <h3>DADOS DO PACIENTE</h3>

        <form id="formulario-pessoa">
            <label for="nome">NOME</label>
            <input type="text" name="nome" id="nome">

            <label for="peso">PESO</label>
            <input type="text" name="peso" id="peso">

            <label for="altura">ALTURA</label>
            <input type="text" name="altura" id="altura">

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
        
        <div id="div-dados">

        </div>
    </div>
